<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solar System</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/solar-system.js"></script>
</head>
<body>
  <div id="hud">
    <div id="info-panel" class="hidden">
      <button id="close-panel" type="button" aria-label="Close panel">&times;</button>
      <h2 id="planet-name">Planet</h2>
      <p id="planet-type" class="meta"></p>
      <p id="planet-facts"></p>
      <button id="fly-back" type="button">Return to overview</button>
    </div>

    <div id="time-controls">
      <div class="control-row">
        <button id="toggle-orbit" type="button" aria-pressed="false">Pause orbits</button>
        <span id="speed-label">Speed: 1x</span>
      </div>
      <label for="time-slider">Time scale</label>
      <input id="time-slider" type="range" min="0" max="1000" value="50" step="1">
      <div class="slider-labels">
        <span>0x</span>
        <span>500x</span>
        <span>1000x</span>
      </div>
    </div>

    <p id="hint">Click a planet to fly closer and read about it.</p>
  </div>

  <a-scene
    solar-system
    starfield="count: 2500"
    renderer="colorManagement: true"
    background="color: #000000">

<a-sound></a-sound>

    <a-entity id="camera-rig" position="0 35 90">
      <a-camera
        id="main-camera"
        look-controls="pointerLockEnabled: false"
        wasd-controls="acceleration: 40; fly: true"
        camera="near: 0.05; far: 2000"
        raycaster="objects: .planet-body; far: 1000">
        <a-cursor
          id="cursor"
          fuse="false"
          material="color: #88ccff; shader: flat"
          geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
          position="0 0 -1">
        </a-cursor>
      </a-camera>
    </a-entity>

    <a-entity id="solar-system-root">
      <a-entity id="sun" class="planet" data-planet-id="sun">
        <a-sphere
          class="planet-body clickable"
          radius="3"
          material="shader: flat; color: #ffcc33; emissive: #ffaa00; emissiveIntensity: 1.2">
        </a-sphere>
        <a-light type="point" intensity="2.5" distance="0" decay="0"></a-light>
        <a-light type="ambient" color="#223" intensity="0.35"></a-light>
      </a-entity>

      <a-entity id="mercury-orbit" orbit="radius: 8; speed: 4.15; inclination: 7">
        <a-entity id="mercury" class="planet" data-planet-id="mercury">
          <a-sphere class="planet-body clickable" radius="0.35" material="shader: flat; color: #b5b5b5"></a-sphere>
        </a-entity>
      </a-entity>

      <a-entity id="venus-orbit" orbit="radius: 11; speed: 1.62; inclination: 3.4">
        <a-entity id="venus" class="planet" data-planet-id="venus">
          <a-sphere class="planet-body clickable" radius="0.55" material="shader: flat; color: #e6c87a"></a-sphere>
        </a-entity>
      </a-entity>

      <a-entity id="earth-orbit" orbit="radius: 14; speed: 1; inclination: 0">
        <a-entity id="earth" class="planet" data-planet-id="earth">
          <a-sphere class="planet-body clickable" radius="0.6" material="shader: flat; color: #4f8fdc"></a-sphere>
          <a-entity moon-orbit="radius: 1.2; speed: 12">
            <a-sphere radius="0.15" material="shader: flat; color: #cccccc"></a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="mars-orbit" orbit="radius: 18; speed: 0.53; inclination: 1.9">
        <a-entity id="mars" class="planet" data-planet-id="mars">
          <a-sphere class="planet-body clickable" radius="0.45" material="shader: flat; color: #c1440e"></a-sphere>
        </a-entity>
      </a-entity>

      <a-entity id="jupiter-orbit" orbit="radius: 28; speed: 0.084; inclination: 1.3">
        <a-entity id="jupiter" class="planet" data-planet-id="jupiter">
          <a-sphere class="planet-body clickable" radius="1.8" material="shader: flat; color: #c88b3a"></a-sphere>
        </a-entity>
      </a-entity>

      <a-entity id="saturn-orbit" orbit="radius: 38; speed: 0.034; inclination: 2.5">
        <a-entity id="saturn" class="planet" data-planet-id="saturn">
          <a-sphere class="planet-body clickable" radius="1.5" material="shader: flat; color: #e8d5a3"></a-sphere>
          <a-ring
            radius-inner="2"
            radius-outer="3.2"
            rotation="-20 0 0"
            material="shader: flat; color: #c9b37a; opacity: 0.75; transparent: true; side: double">
          </a-ring>
        </a-entity>
      </a-entity>

      <a-entity id="uranus-orbit" orbit="radius: 48; speed: 0.012; inclination: 98">
        <a-entity id="uranus" class="planet" data-planet-id="uranus">
          <a-sphere class="planet-body clickable" radius="1.1" material="shader: flat; color: #7de3f4"></a-sphere>
          <a-ring
            radius-inner="1.3"
            radius-outer="1.7"
            rotation="-20 0 0"
            material="shader: flat; color: #9ad9e6; opacity: 0.45; transparent: true; side: double">
          </a-ring>
        </a-entity>
      </a-entity>

      <a-entity id="neptune-orbit" orbit="radius: 58; speed: 0.006; inclination: 28">
        <a-entity id="neptune" class="planet" data-planet-id="neptune">
          <a-sphere class="planet-body clickable" radius="1.05" material="shader: flat; color: #3f54ba"></a-sphere>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
